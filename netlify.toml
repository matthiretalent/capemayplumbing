[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  RETELL_AGENT_ID = "agent_85d09600ec70c32e88217e24c7"
  # RETELL_API_KEY must be set in Netlify dashboard → Site Settings → Environment Variables (never in this file)

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
