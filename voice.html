<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talk to Our AI Assistant</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #0b1c2e; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 24px; }
  h2 { font-size: 22px; margin-bottom: 8px; }
  p { font-size: 14px; color: #8aa0b8; margin-bottom: 32px; }
  #call-btn { width: 90px; height: 90px; border-radius: 50%; background: #1B4F8A; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 24px rgba(27,79,138,0.6); transition: transform 0.15s, background 0.2s; }
  #call-btn:hover { transform: scale(1.07); }
  #call-btn.active { background: #c0392b; animation: pulse 1.5s infinite; }
  #call-btn svg { width: 36px; height: 36px; fill: white; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,0.5)} 50%{box-shadow:0 0 0 16px rgba(192,57,43,0)} }
  #status { margin-top: 20px; font-size: 14px; color: #8aa0b8; min-height: 20px; }
</style>
</head>
<body>
<h2>Roy Sundstrom Plumbing AI</h2>
<p>Click to talk. Ask about services, pricing, or schedule a visit.</p>
<button id="call-btn" title="Start / Stop call">
  <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
</button>
<div id="status">Tap to start talking</div>

<script type="module">
import { RetellWebClient } from 'https://esm.sh/retell-client-js-sdk';
const btn = document.getElementById('call-btn');
const status = document.getElementById('status');
let client = null, active = false;

btn.addEventListener('click', async () => {
  if (active) {
    client.stopCall();
    btn.classList.remove('active');
    active = false;
    status.textContent = 'Call ended. Tap to start again.';
    return;
  }
  try {
    btn.disabled = true;
    status.textContent = 'Connecting...';
    const res = await fetch('/.netlify/functions/retell-token');
    const data = await res.json();
    client = new RetellWebClient();
    client.on('call_ended', () => { btn.classList.remove('active'); active = false; btn.disabled = false; status.textContent = 'Call ended. Tap to start again.'; });
    client.on('error', (e) => { btn.classList.remove('active'); active = false; btn.disabled = false; status.textContent = 'Error — please try again.'; console.error(e); });
    await client.startCall({ accessToken: data.access_token });
    btn.classList.add('active');
    active = true;
    btn.disabled = false;
    status.textContent = 'Connected — speak now';
  } catch(e) {
    console.error(e);
    btn.disabled = false;
    status.textContent = 'Failed to connect. Try again.';
  }
});
</script>
</body>
</html>
